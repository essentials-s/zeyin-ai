<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeyin AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-page" class="page active">
        <div class="wave-container">
            <div class="wave wave1"></div>
            <div class="wave wave2"></div>
            <div class="wave wave3"></div>
        </div>
        <div class="welcome-content">
            <h1 class="glow-text">Welcome</h1>
            <p id="welcome-sub" data-i18n="welcomeSub">Zeyin AI is ready</p>
            <button id="enter-btn" class="btn-primary" data-i18n="enterChat">Enter Chat</button>
        </div>
    </div>

    <div id="chat-page" class="page">
        <aside class="sidebar">
            <div class="logo">Zeyin AI</div>
            <button id="new-chat-btn" class="btn-secondary" data-i18n="newChat">+ New Chat</button>
            <div class="spacer"></div>
            <button id="settings-btn" class="btn-secondary" data-i18n="settings">⚙ Settings</button>
        </aside>
        <main class="chat-main">
            <div id="chat-history"></div>
            <div class="input-container">
                <input type="text" id="chat-input" data-i18n-placeholder="typeMessage" placeholder="Type a message...">
                <button id="send-btn" class="btn-primary" data-i18n="send">Send</button>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2 data-i18n="settings">Settings</h2>
            
            <label data-i18n="langSelect">Language:</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="kk">Қазақша</option>
            </select>

            <label data-i18n="apiKey">OpenRouter API Key:</label>
            <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
            <p class="warning" data-i18n="keyWarning">Key is saved securely in your browser.</p>
            
            <button id="save-settings-btn" class="btn-primary" data-i18n="save">Save & Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
