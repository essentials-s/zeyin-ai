<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeyin AI Chat</title>
    <style>
        /* Базовые стили для чата */
        body { margin: 0; display: flex; height: 100vh; background: #1e293b; color: white; font-family: Arial, sans-serif; }
        .sidebar { width: 260px; background: #0f172a; padding: 20px; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; }
        .input-area { padding: 20px; background: #1e293b; display: flex; border-top: 1px solid #334155; }
        
        .btn { padding: 10px; background: #3b82f6; border: none; color: white; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .input-area input { flex: 1; padding: 15px; border-radius: 5px; border: none; margin-right: 10px; background: #334155; color: white; }
        
        /* Блок настроек */
        .settings { margin-top: auto; padding-top: 20px; border-top: 1px solid #334155; }
        .settings input { width: 90%; padding: 8px; margin-top: 5px; margin-bottom: 10px; border-radius: 4px; border: none; background: #fff; color: #000;}
        select { padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 id="logo-text">Zeyin AI</h2>
        <button class="btn" id="btn-new-chat">+ New Chat</button>
        
        <div class="settings">
            <label id="lbl-lang">Language:</label>
            <select id="lang-select" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="kz">Қазақша</option>
            </select>
            
            <br><br>
            <label id="lbl-api">OpenRouter API Key:</label>
            <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
            <button class="btn" style="width: 100%;" onclick="saveApiKey()" id="btn-save">Save Key</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-history" id="chat-history">
            </div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Message Zeyin AI...">
            <button class="btn" onclick="sendMessage()" id="btn-send">Send</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
